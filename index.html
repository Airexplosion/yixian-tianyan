<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天衍万象 · 天衍仙命图鉴</title>
<style>
  :root{
    --bg:#0d1020; --bg2:#141a32; --card:#1a2140; --card2:#212a4f;
    --line:#2c3563; --txt:#e8ecff; --dim:#9aa6d6; --gold:#ffd479;
    --accent:#7aa2ff; --kw:#8be0c4;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"PingFang SC","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%,#1d2547 0%,var(--bg) 55%) fixed;
    color:var(--txt); line-height:1.65; min-height:100vh; padding-bottom:60px;
  }
  header{
    text-align:center; padding:44px 20px 22px;
    background:radial-gradient(700px 300px at 50% 0,rgba(122,162,255,.16),transparent 70%);
  }
  header h1{
    font-size:2.5rem; letter-spacing:.18em; font-weight:800;
    background:linear-gradient(90deg,#ffe6a8,#ffd479,#ffb86b);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 30px rgba(255,200,100,.18);
  }
  header .sub{color:var(--gold);letter-spacing:.32em;font-size:.82rem;margin-top:6px;opacity:.85}
  header .desc{color:var(--dim);max-width:700px;margin:14px auto 0;font-size:.92rem}
  header .desc b{color:var(--accent)}

  .toolbar{
    position:sticky; top:0; z-index:20; backdrop-filter:blur(12px);
    background:rgba(13,16,32,.85); border-bottom:1px solid var(--line);
    padding:12px 16px; display:flex; flex-direction:column; gap:10px; align-items:center;
  }
  .search{
    width:100%; max-width:420px; background:var(--card); border:1px solid var(--line);
    border-radius:10px; padding:9px 14px; color:var(--txt); font-size:.95rem; outline:none;
  }
  .search:focus{border-color:var(--accent)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;justify-content:center}
  .chip{
    cursor:pointer; user-select:none; border:1px solid var(--line); background:var(--card);
    color:var(--dim); padding:6px 13px; border-radius:18px; font-size:.83rem; transition:.16s; white-space:nowrap;
  }
  .chip:hover{border-color:var(--accent);color:var(--txt)}
  .chip.on{background:linear-gradient(90deg,#ffd479,#ffb86b);color:#1a1320;border-color:transparent;font-weight:700}
  .count{font-size:.78rem;margin-left:4px;opacity:.65}

  .grid{
    max-width:1280px; margin:24px auto 0; padding:0 16px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:13px;
  }
  .item{
    background:linear-gradient(160deg,var(--card),var(--bg2));
    border:1px solid var(--line); border-radius:14px; padding:14px;
    display:flex; gap:13px; transition:.18s; position:relative; overflow:hidden;
  }
  .item:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 10px 30px rgba(0,0,0,.35)}
  .ico,.tile{
    width:60px;height:60px;flex:0 0 60px;border-radius:11px;border:1px solid var(--line);
    box-shadow:inset 0 0 16px rgba(0,0,0,.45);
  }
  .ico{background:#0c1027;object-fit:cover}
  .tile{
    display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;
    color:#fff; text-shadow:0 1px 4px rgba(0,0,0,.5);
  }
  .body{flex:1;min-width:0}
  .nm{font-size:1.1rem;font-weight:700;color:var(--gold);letter-spacing:.04em}
  .nm .pf{font-size:.68rem;background:var(--card2);border:1px solid var(--line);color:var(--accent);
    padding:1px 6px;border-radius:5px;margin-right:6px;vertical-align:middle;font-weight:600}
  .nm .id{font-size:.7rem;color:var(--dim);font-weight:400;margin-left:6px;opacity:.55}
  .eff{font-size:.87rem;color:var(--txt);margin-top:5px;white-space:pre-wrap;word-break:break-word}
  .eff .ref{color:var(--kw)}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
  .tag{font-size:.71rem;padding:2px 8px;border-radius:6px;background:var(--card2);color:var(--accent);border:1px solid var(--line)}
  .tag.act{background:rgba(255,184,107,.14);color:var(--gold);border-color:rgba(255,184,107,.3)}
  .tag.cat{background:rgba(122,162,255,.12);color:var(--accent);border-color:rgba(122,162,255,.25)}

  .empty{text-align:center;color:var(--dim);padding:60px;grid-column:1/-1}
  footer{text-align:center;color:var(--dim);font-size:.78rem;margin-top:40px;opacity:.6;padding:0 20px}
  @media(max-width:560px){header h1{font-size:1.9rem}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <h1>天 衍 万 象</h1>
  <div class="sub">天 衍 仙 命 图 鉴</div>
  <div class="desc">
    每局游戏的第 <b>3 / 6 / 9</b> 轮开始时，可从 <b>4</b> 个随机天衍仙命中选择一个。
    按官方分类共收录 <b id="total">0</b> 个天衍仙命，覆盖常规、主动、获牌、命型、道韵、极牌等全部类型。
  </div>
</header>

<div class="toolbar">
  <input id="q" class="search" placeholder="搜索名称或效果…" autocomplete="off">
  <div class="filters" id="filters"></div>
</div>

<div class="grid" id="grid"></div>

<footer>数据解析自游戏本地化与配置资源 · 仅作信息展示 · 图标版权归原作者所有</footer>

<script>
const CATS=["全部","常规型","主动计数型","主动冷却型","到达轮次获得卡牌","命型","融汇型","扩充牌池型","道韵","极牌"];
const CATCOLOR={
  "常规型":["#3a4a7a","#27325c"],"主动计数型":["#7a5a2a","#5c4420"],"主动冷却型":["#2a6a7a","#1f4f5c"],
  "到达轮次获得卡牌":["#7a2a4a","#5c2038"],"命型":["#5a2a7a","#44205c"],"融汇型":["#2a7a5a","#205c44"],
  "扩充牌池型":["#7a3a2a","#5c2c20"],"道韵":["#5a7a2a","#445c20"],"极牌":["#7a2a2a","#5c2020"]
};
let DATA=[], cat="全部", kw="";
const hl=s=>s.replace(/\[([^\]]+)\]/g,'<span class="ref">[$1]</span>');
function render(){
  const g=document.getElementById('grid');
  const list=DATA.filter(d=>{
    if(cat!=="全部"&&d.category!==cat)return false;
    if(kw){if(!(d.name+d.effect).toLowerCase().includes(kw))return false;}
    return true;
  });
  if(!list.length){g.innerHTML='<div class="empty">没有匹配的天衍仙命</div>';return;}
  g.innerHTML=list.map(d=>{
    const tags=[`<span class="tag cat">${d.category}</span>`]
      .concat((d.tags||[]).map(t=>`<span class="tag${/限|冷却/.test(t)?' act':''}">${t}</span>`)).join('');
    const col=CATCOLOR[d.category]||["#3a4a7a","#27325c"];
    const ico=d.icon
      ? `<img class="ico" loading="lazy" src="icons/${d.icon}" alt="" onerror="this.outerHTML='<div class=\\'tile\\' style=\\'background:linear-gradient(160deg,${col[0]},${col[1]})\\'>'+${JSON.stringify(d.name[0])}+'</div>'">`
      : `<div class="tile" style="background:linear-gradient(160deg,${col[0]},${col[1]})">${d.name[0]}</div>`;
    const pf=d.prefix?`<span class="pf">${d.prefix}</span>`:'';
    return `<div class="item">${ico}<div class="body">
      <div class="nm">${pf}${d.name}<span class="id">#${d.id}</span></div>
      <div class="eff">${hl(d.effect)}</div>
      <div class="tags">${tags}</div></div></div>`;
  }).join('');
}
function buildFilters(){
  const f=document.getElementById('filters');
  f.innerHTML=CATS.map(c=>{
    const n=c==="全部"?DATA.length:DATA.filter(d=>d.category===c).length;
    return `<span class="chip${c===cat?' on':''}" data-c="${c}">${c}<span class="count">${n}</span></span>`;
  }).join('');
  f.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{
    cat=ch.dataset.c;
    f.querySelectorAll('.chip').forEach(x=>x.classList.toggle('on',x.dataset.c===cat));
    render();
  });
}
document.getElementById('q').addEventListener('input',e=>{kw=e.target.value.trim().toLowerCase();render();});
fetch('data.json').then(r=>r.json()).then(d=>{
  DATA=d; document.getElementById('total').textContent=d.length; buildFilters(); render();
});
</script>
</body>
</html>
